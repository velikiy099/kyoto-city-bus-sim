name: Package fixed world

on:
  push:
    branches:
      - fix/plateau-world-geometry
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test artifact path
        run: |
          printf 'artifact transport test\n' > artifact-test.txt
      - uses: actions/upload-artifact@v4
        with:
          name: fixed-world-test
          path: artifact-test.txt
          if-no-files-found: error
